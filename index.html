<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #eceded; }
  #root { min-height: 100vh; }
  .boot { color:#13641f; font-family: 'Noto Sans', Arial, Helvetica, sans-serif; padding: 40px; font-size: 14px; line-height:1.7; }
  .boot .err { color:#e20031; font-weight:bold; }
  .boot .detail { color:#87888a; white-space:pre-wrap; }
  /* plain-language hover tooltip on the ⓘ jargon-helper icons */
  .tip { position: relative; display: inline-flex; align-items: center; justify-content: center;
    width: 15px; height: 15px; margin-left: 5px; border-radius: 50%; background: #eceded;
    color: #58585a; font-size: 10px; font-weight: 700; cursor: help; vertical-align: middle;
    font-family: 'Noto Sans', Arial, sans-serif; letter-spacing: 0; text-transform: none; }
  .tip .tip-body { visibility: hidden; opacity: 0; position: absolute; z-index: 60; left: 50%;
    transform: translateX(-50%); bottom: 145%; width: 230px; background: #333; color: #fff;
    padding: 9px 11px; border-radius: 6px; font-size: 11.5px; line-height: 1.45; font-weight: 400;
    text-align: left; box-shadow: 0 6px 20px rgba(0,0,0,.22); transition: opacity .12s; pointer-events: none; }
  .tip .tip-body::after { content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: #333; }
  /* Inline text links: no underline anywhere in the app — green + bold + the → arrow carry the
     affordance, and hover just lifts the opacity. */
  .link-btn { transition: opacity .12s; }
  .link-btn:hover { opacity: .68; }
  a, a:visited { text-decoration: none; }
  /* hover on desktop; TAP on a phone — the ⓘ is focusable (tabIndex 0), so a tap opens the bubble
     and tapping anywhere else (blur) closes it. No JS, works the same in both modes. */
  .tip:hover .tip-body, .tip:focus .tip-body, .tip:focus-within .tip-body { visibility: visible; opacity: 1; }
  .tip:focus { outline: none; }
  /* Phone/narrow layout (field use). */
  @media (max-width: 800px) {
    /* Stack the input rail above the results. minmax(0,…) + min-width:0 matter: without them a
       grid column can't shrink below its widest child, so the wide tables would push the whole
       page sideways instead of scrolling inside their own card. */
    .proforma-grid { grid-template-columns: minmax(0, 1fr) !important; padding: 16px 12px !important; }
    .proforma-grid > *, .results-col > * { min-width: 0; }
    /* On a phone the bubble docks to the bottom of the screen instead of floating next to the ⓘ —
       a bubble anchored to an icon near the screen edge would run off-screen at 375px. */
    .tip .tip-body { position: fixed; left: 12px; right: 12px; bottom: 14px; width: auto;
      transform: none; font-size: 13px; padding: 12px 14px; }
    .tip .tip-body::after { display: none; }
    /* thumb-sized tap targets + 16px inputs so iOS Safari doesn't zoom on focus */
    button { min-height: 42px; }
    input, select { font-size: 16px !important; min-height: 42px; }
    /* wide tables scroll inside their own card instead of stretching the page sideways */
    .x-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .x-scroll table { min-width: 520px; }
  }
  /* nothing should ever push the page itself sideways on a phone (screen only — clipping the
     document in print can drop content off the right edge of the PDF) */
  @media screen { html, body { overflow-x: hidden; } }
  /* Print / Save-as-PDF one-pager: drop the input rail + on-screen controls,
     let the results column run full width, and force brand colors to render. */
  .print-only { display: none; }
  @media print {
    @page { margin: 11mm; }
    html, body { background: #fff !important; }
    .no-print { display: none !important; }
    .print-only { display: block !important; }
    .proforma-grid { grid-template-columns: 1fr !important; }
    /* keep each results card intact across a page boundary — no card splits mid-chart/mid-banner */
    .results-col > div { break-inside: avoid; page-break-inside: avoid; margin-bottom: 10px !important; }
    /* except the tall steady-state table: let it flow and break between rows, not jump a whole page */
    .print-tall { break-inside: auto !important; page-break-inside: auto !important; }
    .print-tall tr, .print-tall thead { break-inside: avoid; page-break-inside: avoid; }
    .print-tall thead { display: table-header-group; } /* repeat header on the 2nd page of the table */
    svg { break-inside: avoid; page-break-inside: avoid; }
    .print-card { break-inside: avoid; page-break-inside: avoid; }
    .detail-body { display: block !important; } /* collapsible sections (steady-state table, executive summary) always print */
    /* PAGE 1 IS THE PITCH. The three beats are tightened just enough to land on one page together —
       a leave-behind that splits the argument across a page break argues half as well — and the
       supporting detail is pushed behind a hard break. */
    .beat { padding: 9px 13px !important; margin-bottom: 6px !important; }
    .beat-hero { font-size: 27px !important; }
    .beat-tile { font-size: 15px !important; }
    .beat-body { font-size: 12px !important; line-height: 1.4 !important; }
    .beat-sub { font-size: 10.5px !important; line-height: 1.4 !important; }
    .pitch-end { break-after: page; page-break-after: always; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  }
</style>

<script type="text/plain" id="appsource">
const { useState, useMemo, useEffect } = React;

/* ============================================================
   2G MINING PROFORMA MODELER v4 — 2G rental vs owned vs grid
   Bitcoin mining on stranded gas · month-by-month engine
   Models: deployment lead time, network hashrate growth,
   the 2028 halving, pool fees, and genset residual value.
   Market data verified July 2026:
     BTC ~$62–64k · network ~940 EH/s · hashprice ~$29/PH/day
     Current-gen air-cooled ASIC: 270 TH/s @ 3.645 kW, 13.5 J/TH (~$21/TH)
     MW-class NG genset factory lead times ~12+ months
   ============================================================ */

// Palette mapped onto the locked 2G Energy Rental design system (see Design System/):
// page recedes to gray-10, cards are white/raised, inset inputs sit back at gray-10,
// single Pantone-364-U green throughout. No dark mode. Semantic amber = warning (#fbba00),
// red = danger (#e20031). Do not invent new hex values here.
const C = {
  bg: "#eceded",       // page background (gray-10)
  panel: "#ffffff",    // cards / raised surfaces
  panel2: "#eceded",   // inset controls (inputs), zebra rows
  line: "#b1b3b4",     // borders / dividers (gray-40)
  text: "#58585a",     // default body text (gray-80)
  muted: "#87888a",    // muted/secondary text (gray-60)
  green: "#13641f",    // 2G green (primary) — the 2G rental + rent-to-own series
  greenLt: "#caffdb",  // light-green tint ONLY (pale panels, hover) — never a CTA
  amber: "#fbba00",    // semantic warning — the "CUSTOM inputs" flag
  red: "#e20031",      // semantic danger — halving markers, errors
  // multi-series data-viz colors (from the design-system chart palette) — used ONLY
  // for the two non-2G paths on the cash chart/tables, never for UI chrome.
  owned: "#ee7f01",    // owned generation series (chart orange — reads on white)
  grid: "#005d9d",     // utility/grid power series (chart blue = info)
};

const fmt = (n, d = 0) =>
  n === null || n === undefined || isNaN(n) || !isFinite(n)
    ? "—"
    : n.toLocaleString("en-US", { maximumFractionDigits: d, minimumFractionDigits: d });
const money = (n, d = 0) =>
  n === null || n === undefined || isNaN(n) || !isFinite(n)
    ? "—"
    : (n < 0 ? "(" : "") + "$" + fmt(Math.abs(n), d) + (n < 0 ? ")" : "");
const moneyM = (n) =>
  n === null || isNaN(n) ? "—" :
  (n < 0 ? "($" : "$") + Math.abs(n / 1e6).toFixed(2) + "M" + (n < 0 ? ")" : "");

/* months from today to the next halving. Anchored to ~April 20, 2028; after it passes,
   rolls to the following halving (every 4 years). Computed at load so the countdown never
   goes stale — unlike a hardcoded number. (browser new Date() is fine here.) */
function monthsUntilHalving() {
  const now = new Date();
  let target = new Date(2028, 3, 20); // April = month index 3
  while (target <= now) target = new Date(target.getFullYear() + 4, 3, 20);
  const months = (target.getFullYear() - now.getFullYear()) * 12 + (target.getMonth() - now.getMonth());
  return Math.max(0, months);
}

/* ---------- monthly simulation engine ---------- */
function computeModel(a, dynamic) {
  const g = (k) => a[k].v;
  const kW = g("siteKW");
  const nASIC = g("drawKW") > 0 ? Math.floor(kW / g("drawKW")) : 0; // whole units — a fleet is integer miners
  const fleetTH = g("hashTH") * nASIC;
  const genCapex = kW * g("msrpPerKW");
  const hwCapex = nASIC * g("asicPrice");
  const months = Math.max(12, Math.round(g("years") * 12));
  const dpm = 365 / 12;
  const dr = g("discRate") / 12 / 100; // monthly discount rate for NPV (0 ⇒ NPV = nominal net)

  const revAt = (m, uptime) => {
    const nh = g("netHashEH") * 1e6 * (dynamic ? Math.pow(1 + g("hashGrowth") / 100, m / 12) : 1);
    // halvings repeat every 48 months after the first (≈Apr 2028, 2032, ...)
    const nHalvings = dynamic && m >= g("halvingMo") ? 1 + Math.floor((m - g("halvingMo")) / 48) : 0;
    const iss = g("issuance") / Math.pow(2, nHalvings);
    const pr = g("btcPrice") * (dynamic ? Math.pow(1 + g("priceGrowth") / 100, m / 12) : 1);
    return nh > 0 ? (fleetTH / nh) * iss * pr * (1 - g("poolFee") / 100) * dpm * uptime : 0;
  };
  const fuelMo = (scfkW, uptime) => (kW * scfkW * 8760 / 1000) * uptime * g("gasPrice") / 12;
  // maintenance scales with energy actually generated: ¢/kWh × annual kWh ÷ 12
  const maintMo = (uptime) => (g("ownedMaint") / 100) * (kW * 8760 * uptime) / 12;
  // top-end rebuild: lump cost each time cumulative engine-hours cross a threshold
  const rebuildAt = (hoursBefore, hoursAfter) => {
    const thr = g("rebuildHrs");
    if (thr <= 0) return 0;
    const events = Math.floor(hoursAfter / thr) - Math.floor(hoursBefore / thr);
    return events * g("rebuildCost") * kW;
  };

  // utility / grid power
  const gridCap = kW * g("gridCapex"); // interconnection / substation cost, paid up front
  // all-in power bill: headline rate × demand/capacity uplift × kWh generated that month
  const gridPowerMo = (uptime) => g("gridRate") * g("gridUplift") * (kW * 8760 * uptime / 12);

  const scen = (type) => {
    const lag = dynamic
      ? (type === "own" ? g("ownedLagMo")
        : type === "grid" ? g("gridLagMo")
        : g("rentalLagMo"))
      : 0;
    let c = 0, npv = 0;
    const cash = [];
    let engHrs = 0; // cumulative engine-hours on a customer-owned genset (drives rebuild timing)
    // running totals for the break-even POWER COST solve (see bePowerCost below): all the revenue
    // this path earns over the horizon, and all the kWh it consumes earning it.
    let revTotal = 0, kwhTotal = 0, costTotal = 0;
    for (let m = 0; m < months; m++) {
      let f = 0;
      if (type === "own" && m === 0) f -= genCapex;               // genset ordered day 1
      if (type === "grid" && m === 0) f -= gridCap;               // interconnection paid up front
      if (m === Math.max(0, Math.round(lag) - 1)) f -= hwCapex;   // miners bought pre power-on
      if (m >= lag) {
        if (type === "own") {
          const up = g("ownUptime") / 100;
          const h0 = engHrs; engHrs += 730 * up;
          const ownCost = fuelMo(g("fuelOwn"), up) + maintMo(up) + g("otherOpex") / 12 + rebuildAt(h0, engHrs);
          f += revAt(m, up) - ownCost;
          revTotal += revAt(m, up); kwhTotal += 730 * up * kW; costTotal += ownCost;
        } else if (type === "grid") {
          const up = g("gridUptime") / 100;
          // no fuel, no genset, no rental — just the utility power bill
          const gridCost = gridPowerMo(up);
          f += revAt(m, up) - gridCost;
          revTotal += revAt(m, up); kwhTotal += 730 * up * kW; costTotal += gridCost;
        } else {
          // 2G rental: all-in rate covers the genset, service, maintenance and rebuilds.
          const up = g("rentUptime") / 100;
          const rentCost = fuelMo(g("fuel2G"), up) + g("rentalRate") * kW;
          f += revAt(m, up) - rentCost;
          revTotal += revAt(m, up); kwhTotal += 730 * up * kW; costTotal += rentCost;
        }
      }
      c += f;
      npv += f / Math.pow(1 + dr, m);
      cash.push(c);
    }
    // terminal value — only the owned path has an asset left at the horizon
    let terminal = 0;
    if (type === "own") terminal = genCapex * g("residualPct") / 100;
    c += terminal;
    npv += terminal / Math.pow(1 + dr, months - 1); // terminal realized at the horizon month
    if (cash.length) cash[cash.length - 1] = c;
    // BREAK-EVEN POWER COST — the pitch's third beat: the most a miner can pay per kWh, all-in,
    // and still come out even over the whole horizon after paying for the rigs.
    //   net = revTotal − price × kwhTotal − hardware  →  price = (revTotal − hardware) / kwhTotal
    // Net cash is exactly linear in the power price, so this is solved, not searched. It differs
    // from Mode A's version on purpose: this one carries lead time, uptime, difficulty growth,
    // the halving AND the cost of the miners, where Mode A is a today-snapshot of power alone.
    // Can come out NEGATIVE — meaning even free power doesn't clear the rigs in this window. That
    // is a real answer and the UI says so rather than hiding it.
    const bePowerCost = kwhTotal > 0 ? ((revTotal - hwCapex) / kwhTotal) * 100 : null;
    // What this path actually charges for power, all-in over the same horizon — fuel + rental for
    // 2G, fuel + maintenance + rebuilds + the genset itself (net of resale) for owned, the utility
    // bill + interconnection for grid. Paired with bePowerCost this is the whole story in one
    // comparison: delivered < break-even ⇒ the site makes money, and the gap × kWh IS the net cash.
    const powerCapex = type === "own" ? genCapex - terminal : type === "grid" ? gridCap : 0;
    const deliveredPowerCost = kwhTotal > 0 ? ((costTotal + powerCapex) / kwhTotal) * 100 : null;
    return { net: c, npv, cash, terminal, revTotal, kwhTotal, costTotal, bePowerCost, deliveredPowerCost };
  };

  const own = scen("own");
  const rent = scen("rent");
  const grid = scen("grid");

  // steady-state annual run rate (both deployed, today's network) — the classic table
  const steady = (uptime, isRental) => {
    const kwh = 8760 * uptime * kW;
    const mcf = (kW * (isRental ? g("fuel2G") : g("fuelOwn")) * 8760 / 1000) * uptime;
    const rev = revAt(0, uptime) * 12; // month-0 economics annualized
    const fuel = mcf * g("gasPrice");
    const rental = isRental ? g("rentalRate") * kW * 12 : 0;
    const routine = isRental ? 0 : (g("ownedMaint") / 100) * kwh;
    // levelized rebuild reserve: (rebuild $/yr) = cost per event × events per year at this uptime
    const hrsYr = 8760 * uptime;
    const rebuildYr = isRental || g("rebuildHrs") <= 0 ? 0
      : g("rebuildCost") * kW * (hrsYr / g("rebuildHrs"));
    const maint = routine + rebuildYr;
    const other = isRental ? 0 : g("otherOpex");
    const opex = fuel + rental + maint + other;
    const ocf = rev - opex;
    const capex = isRental ? hwCapex : genCapex + hwCapex;
    const payback = ocf > 0 ? capex / ocf : null;
    const powerCost = kwh > 0 ? ((fuel + (isRental ? rental : maint)) / kwh) * 100 : null;
    const lcoe = isRental ? powerCost
      : kwh > 0 ? ((fuel + maint + genCapex / g("years")) / kwh) * 100 : null;
    return { kwh, mcf, rev, fuel, rental, maint, other, opex, ocf, capex, payback, powerCost, lcoe };
  };
  const sOwn = steady(g("ownUptime") / 100, false);
  const sRent = steady(g("rentUptime") / 100, true);

  // grid steady-state (same shape as steady(), but power bill replaces fuel/rental/maint)
  const sGrid = (() => {
    const up = g("gridUptime") / 100;
    const allIn = g("gridRate") * g("gridUplift");
    const kwh = 8760 * up * kW;
    const rev = revAt(0, up) * 12;
    const power = allIn * kwh;         // annual utility bill, all-in
    const capex = gridCap + hwCapex;   // interconnection + miners
    const ocf = rev - power;
    return {
      kwh, mcf: 0, rev, fuel: 0, rental: 0, maint: 0, other: 0, power,
      opex: power, ocf, capex,
      payback: ocf > 0 ? capex / ocf : null,
      powerCost: kwh > 0 ? (power / kwh) * 100 : null,
      lcoe: kwh > 0 ? ((power + gridCap / g("years")) / kwh) * 100 : null,
    };
  })();

  // single 2G path now (rent-to-own removed) — kept as best2G/best2Gnpv so callers don't churn
  const best2G = rent.net;
  const best2Gnpv = rent.npv;
  return {
    nASIC, fleetTH, genCapex, hwCapex, months, gridCap, discRate: g("discRate"),
    dailyBTC: fleetTH / (g("netHashEH") * 1e6) * g("issuance"),
    baseRevDay: revAt(0, 1) / dpm, // rev/day at 100% uptime, month 0
    // implied hashprice: network-wide $/PH/s/day at these inputs (gross, index convention)
    hashprice: g("netHashEH") > 0 ? (g("issuance") * g("btcPrice")) / (g("netHashEH") * 1000) : 0,
    own, rent, grid, sOwn, sRent, sGrid,
    best2G, advantage: best2G - own.net,
    best2Gnpv, advantageNpv: best2Gnpv - own.npv,
    uptimeDeltaPts: g("rentUptime") - g("ownUptime"),
    extraKWh: sRent.kwh - sOwn.kwh,
    firstHashOwn: dynamic ? g("ownedLagMo") : 0,
    firstHashRent: dynamic ? g("rentalLagMo") : 0,
    firstHashGrid: dynamic ? g("gridLagMo") : 0,
  };
}

/* ---------- Mode A: "Does mining pay?" ----------
   A right-now snapshot for ANY miner: type your power cost (¢/kWh), pick a rig, and see
   whether it pays — no gas, gensets, or lead times. Deliberately closed-form (not the
   month-by-month engine), but revenue reuses the SAME formula as computeModel's revAt(0,1)
   so the two modes can never disagree on what a fleet earns. Computed at 100% uptime — margin
   and both break-evens are uptime-invariant anyway; only the absolute $/day + payback scale. */
function computeModeA(a) {
  const g = (k) => a[k].v;
  const kW = g("siteKW");
  const nASIC = g("drawKW") > 0 ? Math.floor(kW / g("drawKW")) : 0;
  const fleetTH = g("hashTH") * nASIC;
  const nh = g("netHashEH") * 1e6; // network TH/s
  // BTC/day the fleet earns AFTER pool fee — matches revAt()'s (1 − poolFee) treatment
  const btcDay = nh > 0 ? (fleetTH / nh) * g("issuance") * (1 - g("poolFee") / 100) : 0;
  const revDay = btcDay * g("btcPrice");
  const costPerKWh = g("powerCost") / 100;        // ¢ → $
  const powerDay = kW * 24 * costPerKWh;           // full-tilt daily power bill
  const profitDay = revDay - powerDay;
  const margin = revDay > 0 ? profitDay / revDay : 0;
  const hwCapex = nASIC * g("asicPrice");
  const dpm = 365 / 12;
  return {
    nASIC, fleetTH, hwCapex, btcDay, revDay, powerDay, profitDay, margin,
    // BTC price at which revenue = power cost (revenue scales linearly with price)
    beBTC: btcDay > 0 ? powerDay / btcDay : null,
    // THE hook: the highest ¢/kWh you can pay and still break even
    bePowerCost: kW > 0 ? (revDay / (kW * 24)) * 100 : null,
    // months to pay back the rigs (only if buying and profitable)
    paybackMo: hwCapex > 0 && profitDay > 0 ? hwCapex / profitDay / dpm : null,
  };
}

/* scenario sensitivity — bear / base / bull BTC price */
function scenarios(a, dynamic) {
  const mk = (mult, name) => {
    const b = {};
    Object.keys(a).forEach((k) => (b[k] = { ...a[k] }));
    b.btcPrice = { ...b.btcPrice, v: a.btcPrice.v * mult };
    const m = computeModel(b, dynamic);
    return { name, price: b.btcPrice.v, own: m.own.net, best2G: m.best2G, adv: m.best2G - m.own.net };
  };
  return [mk(0.65, "Bear"), mk(1, "Base"), mk(1.6, "Bull")];
}

/* break-even BTC price: the price at which the 2G advantage (best2G − owned) crosses zero.
   The advantage rises with BTC price (2G earns during the rich early months owned is still
   waiting), so this is a FLOOR — below it, owning wins. Binary search, assuming monotonicity. */
function breakEvenBTC(a, dynamic) {
  const advAt = (price) => {
    const b = {};
    Object.keys(a).forEach((k) => (b[k] = { ...a[k] }));
    b.btcPrice = { ...b.btcPrice, v: price };
    const m = computeModel(b, dynamic);
    return m.best2G - m.own.net;
  };
  let lo = 0, hi = Math.max(a.btcPrice.v * 6, 6000);
  const aLo = advAt(lo), aHi = advAt(hi);
  if ((aLo > 0) === (aHi > 0)) return null; // no sign change in range → no clean break-even
  for (let i = 0; i < 40; i++) {
    const mid = (lo + hi) / 2;
    if ((advAt(mid) > 0) === (aLo > 0)) lo = mid; else hi = mid;
  }
  return (lo + hi) / 2;
}

/* Absolute viability: the BTC price at which the BEST 2G path's net cash crosses zero — i.e.
   "does this project make money at all, and if not, what would it take?".
   Deliberately distinct from breakEvenBTC() above, which solves the 2G-vs-owned CROSSOVER.
   That one is a relative metric: both paths can be deep losses on either side of it. */
function viableBTC(a, dynamic) {
  const netAt = (price) => {
    const b = {};
    Object.keys(a).forEach((k) => (b[k] = { ...a[k] }));
    b.btcPrice = { ...b.btcPrice, v: price };
    return computeModel(b, dynamic).best2G;
  };
  const lo0 = 0, hi0 = Math.max(a.btcPrice.v * 8, 20000);
  if ((netAt(lo0) >= 0) === (netAt(hi0) >= 0)) return null; // no sign change in range
  let lo = lo0, hi = hi0;
  for (let i = 0; i < 50; i++) {
    const mid = (lo + hi) / 2;
    if (netAt(mid) < 0) lo = mid; else hi = mid;
  }
  return (lo + hi) / 2;
}

// Plain-language jargon helper. Renders a small ⓘ that reveals a hover bubble (.tip CSS is in the head).
// Only use where there's no scroll/overflow clip (results column + the simple rail) — see HANDOFF gotchas.
// tabIndex makes it focusable so a phone TAP opens the bubble (CSS :focus), not just desktop hover.
const Info = ({ children }) => (
  <span className="tip" tabIndex={0} role="button" aria-label="What this means">i<span className="tip-body">{children}</span></span>
);

const labelStyle = {
  fontSize: 11, letterSpacing: ".08em", textTransform: "uppercase",
  color: C.muted, fontFamily: mono, marginBottom: 5, display: "block",
};
const inputStyle = {
  background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 4,
  color: C.text, fontFamily: mono, fontSize: 14, padding: "7px 9px",
  width: "100%", outline: "none",
};
const segBtn = (active) => ({
  flex: 1, padding: "8px 4px",
  background: active ? C.greenLt : C.panel2,
  border: `1px solid ${active ? C.green : C.line}`,
  color: active ? C.green : C.muted,
  fontFamily: mono, fontSize: 12, fontWeight: active ? 700 : 400, borderRadius: 4, cursor: "pointer",
});

function SectionTitle({ children }) {
  return (
    <div style={{
      fontFamily: cond, fontSize: 17, fontWeight: 700, letterSpacing: ".06em",
      textTransform: "uppercase", color: C.text,
      borderBottom: `1px solid ${C.line}`, padding: "0 0 6px", margin: "0 0 10px",
    }}>{children}</div>
  );
}

function NumInput({ k, a, setA, label, tip }) {
  const item = a[k];
  const lo = item.min ?? -Infinity, hi = item.max ?? Infinity;
  // Hold the raw text while typing so decimals ("0.25") and a temporarily-empty field don't fight
  // you; clamp + commit to the model on blur / Enter, not on every keystroke.
  const [text, setText] = useState(String(item.v));
  useEffect(() => { setText(String(item.v)); }, [item.v]); // reflect preset / reset / shared-link changes
  const commit = () => {
    const raw = parseFloat(text);
    const v = isNaN(raw) ? item.v : Math.min(hi, Math.max(lo, raw));
    setText(String(v));
    if (v !== item.v) setA({ ...a, [k]: { ...item, v } });
  };
  return (
    <div style={{ marginBottom: 11 }}>
      <label style={labelStyle}>{label ?? item.label}{tip && <Info>{tip}</Info>}</label>
      <input
        type="number"
        step={item.step ?? "any"}
        min={isFinite(lo) ? lo : undefined}
        max={isFinite(hi) ? hi : undefined}
        value={text}
        onChange={(e) => setText(e.target.value)}
        onBlur={commit}
        onKeyDown={(e) => { if (e.key === "Enter") e.target.blur(); }}
        style={inputStyle}
      />
    </div>
  );
}

/* Segmented AIR / HYDRO / IMMERSION toggle (renders one button per COOLING entry).
   Swaps the machine's hash, draw and price as a set. Highlights the matching preset, or
   nothing (custom) once hand-edited.
   Used in both rails. Add a cooling type by adding one entry to COOLING; the UI follows. */
function CoolingToggle({ a, setA }) {
  const active = activeCooling(a);
  const setCooling = (key) => {
    if (active === key) return; // already there — don't needlessly drop out of preset mode
    const p = COOLING[key].patch;
    const next = {};
    Object.keys(a).forEach((k) => (next[k] = { ...a[k] }));
    next.hashTH = { ...next.hashTH, v: p.hashTH };
    next.drawKW = { ...next.drawKW, v: p.drawKW };
    next.asicPrice = { ...next.asicPrice, v: p.asicPrice };
    setA(next);
  };
  const jTH = (a.drawKW.v * 1000 / a.hashTH.v);
  const perTH = a.hashTH.v > 0 ? a.asicPrice.v / a.hashTH.v : 0;
  const priceTxt = `≈$${perTH.toFixed(0)}/TH`;
  return (
    <div style={{ marginBottom: 12 }}>
      <label style={labelStyle}>ASIC cooling</label>
      <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
        {Object.keys(COOLING).map((key) => (
          <button key={key} style={segBtn(active === key)} onClick={() => setCooling(key)}>{COOLING[key].label}</button>
        ))}
      </div>
      <div style={{ fontSize: 10.5, color: C.muted, marginBottom: 4, lineHeight: 1.45 }}>
        {active
          ? `${COOLING[active].short} — ${fmt(a.hashTH.v)} TH/s @ ${a.drawKW.v} kW (${jTH.toFixed(1)} J/TH, ${priceTxt}). ` + COOLING[active].note
          : "Custom hardware — not a stock air-, hydro-, or immersion-cooled machine."}
      </div>
    </div>
  );
}

/* Rig catalog dropdown (Mode A). Picking a machine sets hash + draw + price as a set;
   "Custom" reveals the three fields to type. Grouped by maker for neutrality. */
function RigPicker({ a, setA }) {
  const active = activeRig(a);
  const selectRig = (id) => {
    const r = RIGS.find((x) => x.id === id);
    if (!r) return; // "custom" — keep current values, user edits the revealed fields
    setA({
      ...a,
      hashTH:    { ...a.hashTH,    v: r.hashTH },
      drawKW:    { ...a.drawKW,    v: rigDrawKW(r) },
      asicPrice: { ...a.asicPrice, v: r.price },
    });
  };
  const jTH = a.hashTH.v > 0 ? (a.drawKW.v * 1000 / a.hashTH.v) : 0;
  return (
    <div style={{ marginBottom: 14 }}>
      <label style={labelStyle}>Your mining rig</label>
      <select value={active ? active.id : "custom"} onChange={(e) => selectRig(e.target.value)}
        style={{ ...inputStyle, cursor: "pointer" }}>
        {["Bitmain", "MicroBT"].map((mk) => (
          <optgroup key={mk} label={mk}>
            {RIGS.filter((r) => r.maker === mk).map((r) => (
              <option key={r.id} value={r.id}>{r.name} — {r.hashTH} TH/s · {r.jTH} J/TH</option>
            ))}
          </optgroup>
        ))}
        <option value="custom">Custom (enter your own)</option>
      </select>
      {active ? (
        <div style={{ fontSize: 10.5, color: C.muted, marginTop: 5, lineHeight: 1.4 }}>
          {active.hashTH} TH/s @ {rigDrawKW(active)} kW · {active.jTH} J/TH · ≈${active.price.toLocaleString()}/unit (price editable in Advanced)
        </div>
      ) : (
        <div style={{ marginTop: 8, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          <NumInput k="hashTH" a={a} setA={setA} label="Hashrate (TH/s)" />
          <NumInput k="drawKW" a={a} setA={setA} label="Power draw (kW)" />
          <NumInput k="asicPrice" a={a} setA={setA} label="Price ($/unit)" />
          <div style={{ alignSelf: "end", fontSize: 11, color: C.muted, fontFamily: mono, paddingBottom: 9 }}>= {jTH.toFixed(1)} J/TH</div>
        </div>
      )}
    </div>
  );
}

/* Mode A — "Does mining pay?" The neutral front door: power cost + rig → verdict.
   Reuses the shared engine's revenue math (via computeModeA) so it never disagrees with Mode B. */
function ModeAView({ a, setA, mA, live, fetchLive, goToSiteMode, goToGas }) {
  // No underline — the green + bold + the → arrow already read as "this is clickable".
  const linkBtn = { background: "none", border: "none", color: C.green, fontWeight: 700, cursor: "pointer", fontFamily: FONT, fontSize: 12.5, padding: 0 };
  const g = (k) => a[k].v;
  const pays = mA.profitDay >= 0;
  return (
    <div style={{ maxWidth: 720, margin: "0 auto", padding: "22px 20px" }}>
      <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 8, padding: 20, marginBottom: 16 }}>
        <div style={{ fontFamily: FONT, fontWeight: 700, fontSize: 18, color: C.text, marginBottom: 4 }}>Does mining pay?</div>
        <div style={{ fontSize: 12, color: C.muted, marginBottom: 16, lineHeight: 1.5 }}>
          Enter your power cost, pick your rig, and see if it profits at today's bitcoin price.
        </div>
        <RigPicker a={a} setA={setA} />
        <NumInput k="powerCost" a={a} setA={setA} label="Your power cost (¢/kWh)" />
        <NumInput k="siteKW" a={a} setA={setA} label="How much power you run (kW)" />
        <div style={{ fontSize: 10.5, color: C.muted, margin: "-6px 0 12px" }}>≈ {fmt(mA.nASIC)} miners · {fmt(mA.fleetTH / 1000, 1)} PH/s fleet</div>
        <NumInput k="btcPrice" a={a} setA={setA} label="Bitcoin price ($)" />
        <button onClick={fetchLive} disabled={live && live.state === "loading"}
          style={{ ...segBtn(false), width: "100%", marginTop: 2, cursor: live && live.state === "loading" ? "wait" : "pointer" }}>
          {live && live.state === "loading" ? "↻ FETCHING…" : "↻ FETCH LIVE BTC"}
        </button>
        {live && <div style={{ fontSize: 10, marginTop: 6, fontFamily: mono, color: live.state === "err" ? C.red : live.state === "ok" ? C.green : C.muted }}>{live.msg}</div>}
      </div>

      <div style={{ background: C.panel, border: `2px solid ${pays ? C.green : C.red}`, borderRadius: 8, padding: "18px 20px", marginBottom: 16 }}>
        <div style={{ fontFamily: mono, fontSize: 11, letterSpacing: ".1em", textTransform: "uppercase", color: C.muted }}>Profit per day {pays ? "" : "(loss)"}</div>
        <div style={{ fontFamily: mono, fontSize: 34, fontWeight: 700, color: pays ? C.green : C.red, margin: "2px 0 4px" }}>{money(mA.profitDay)}</div>
        <div style={{ fontSize: 12.5, color: C.text, lineHeight: 1.5 }}>
          {pays
            ? `Profitable — ${fmt(mA.margin * 100, 0)}% margin at ${money(g("btcPrice"))} BTC and ${fmt(g("powerCost"), 1)}¢/kWh power.`
            : `Loses money at ${fmt(g("powerCost"), 1)}¢/kWh. You'd need power below ${fmt(mA.bePowerCost, 1)}¢/kWh, or BTC above ${money(mA.beBTC)}.`}
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px,1fr))", gap: 10, marginBottom: 16 }}>
        {[
          ["Break-even power cost", mA.bePowerCost != null ? fmt(mA.bePowerCost, 1) + "¢/kWh" : "—", "The most you can pay for power and still break even. Anything below this profits."],
          ["Break-even BTC price", money(mA.beBTC), "The bitcoin price at which mining revenue equals your power bill."],
          ["Revenue / day", money(mA.revDay), "Mining revenue per day at 100% uptime, after pool fee."],
          ["Power cost / day", money(mA.powerDay), "Your electricity bill per day running full-tilt."],
          ["Payback", mA.paybackMo != null ? fmt(mA.paybackMo, 1) + " mo" : "—", "Months to earn back the cost of the rigs from profit (if buying)."],
        ].map(([l, v, tip]) => (
          <div key={l} style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 6, padding: "11px 13px" }}>
            <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: ".06em", textTransform: "uppercase", color: C.muted }}>{l}<Info>{tip}</Info></div>
            <div style={{ fontFamily: mono, fontSize: 17, fontWeight: 600, color: C.text, marginTop: 3 }}>{v}</div>

/* Site sizing (Mode B): size the project by power (kW) or by available gas (MCF/day).
   Gas → kW via the genset fuel burn: kW = MCF/day × 1000 ÷ 24 ÷ (scf/hr per kW),
   ≈ 4.5 kW per MCF/day (≈ 1 MW per ~220 MCF/day) at the default ~9.27 scf/hr/kW.
   siteKW stays the canonical size the engine reads; gas mode just derives it. */
function SiteSizer({ a, setA, sizeBy, setSizeBy }) {
  const burn = a.fuelOwn.v > 0 ? a.fuelOwn.v : 9.27;   // scf/hr per kW
  const kWperMCFD = 1000 / 24 / burn;                  // ≈ 4.5
  const kwToMcfd = (kw) => kw / kWperMCFD;
  const mcfdToKw = (mcfd) => mcfd * kWperMCFD;
  // gas-mode input holds MCF/day text, synced from the canonical siteKW
  const [gasText, setGasText] = useState(String(Math.round(kwToMcfd(a.siteKW.v))));
  useEffect(() => { setGasText(String(Math.round(kwToMcfd(a.siteKW.v)))); }, [a.siteKW.v, burn]);
  const commitGas = () => {
    const mcfd = parseFloat(gasText);
    if (!isNaN(mcfd) && mcfd >= 0) {
      const kw = Math.max(1, Math.round(mcfdToKw(mcfd)));
      if (kw !== a.siteKW.v) setA({ ...a, siteKW: { ...a.siteKW, v: kw } });
    } else { setGasText(String(Math.round(kwToMcfd(a.siteKW.v)))); }
  };
  const nASIC = a.drawKW.v > 0 ? Math.floor(a.siteKW.v / a.drawKW.v) : 0;
  const mw = a.siteKW.v / 1000;
  return (
    <div style={{ marginBottom: 14 }}>
      <label style={labelStyle}>Size the project by</label>
      <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
        <button style={segBtn(sizeBy === "kw")} onClick={() => setSizeBy("kw")}>POWER (kW)</button>
        <button style={segBtn(sizeBy === "gas")} onClick={() => setSizeBy("gas")}>GAS (MCF/day)</button>
      </div>
      {sizeBy === "kw" ? (
        <NumInput k="siteKW" a={a} setA={setA} label="Site size (kW)" />
      ) : (
        <div>
          <label style={labelStyle}>Gas available (MCF/day)</label>
          <input type="number" min="0" step="10" value={gasText}
            onChange={(e) => setGasText(e.target.value)} onBlur={commitGas}
            onKeyDown={(e) => { if (e.key === "Enter") e.target.blur(); }}
            style={inputStyle} />
          <div style={{ fontSize: 10.5, color: C.muted, marginTop: 5, lineHeight: 1.45 }}>
            ≈ {fmt(mw, mw < 10 ? 1 : 0)} MW → {fmt(nASIC)} miners · ~{kWperMCFD.toFixed(1)} kW per MCF/day (at {burn} scf/hr/kW burn)
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- cumulative cash chart, 4 series ---------- */
function niceStep(span, targetTicks) {
  const raw = span / targetTicks;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  for (const mult of [1, 2, 2.5, 5, 10]) {
    if (mag * mult >= raw) return mag * mult;
  }
  return mag * 10;
}
function CashChart({ m, halvingMo, dynamic }) {
  const W = 720, H = 260, padL = 74, padR = 18, padT = 16, padB = 30;
  // draw order = paint order: non-2G paths first, 2G hero paths last (on top)
  const series = [
    { arr: m.grid.cash, color: C.grid, dash: "", w: 2.25 },
    { arr: m.own.cash, color: C.owned, dash: "", w: 2.25 },
    { arr: m.rent.cash, color: C.green, dash: "", w: 2.75 },
  ];
  const all = series.flatMap((s) => s.arr).concat([0]);
  const dMin = Math.min(...all), dMax = Math.max(...all);
  const step = niceStep((dMax - dMin) || 1, 5);
  const min = Math.floor(dMin / step) * step;
  const max = Math.ceil(dMax / step) * step;
  const span = max - min || 1;
  const ticks = [];
  for (let v = min; v <= max + step / 2; v += step) ticks.push(v);
  const N = m.months;
  const x = (i) => padL + (i / (N - 1)) * (W - padL - padR);
  const y = (v) => padT + (1 - (v - min) / span) * (H - padT - padB);
  const path = (arr) => arr.map((v, i) => `${i === 0 ? "M" : "L"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const fm = (v) => {
    if (v === 0) return "$0";
    const s = v < 0 ? "-$" : "$";
    const av = Math.abs(v);
    if (av >= 1e6) return s + (av / 1e6).toLocaleString("en-US", { maximumFractionDigits: 1 }) + "M";
    return s + (av / 1e3).toFixed(0) + "k";
  };
  const yrs = Math.round(N / 12);
  const yearEvery = yrs > 7 ? 2 : 1; // avoid crowded x labels on long horizons
  const showHalving = dynamic && halvingMo > 0 && halvingMo < N;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      {/* gridlines + y labels */}
      {ticks.map((v, i) => (
        <g key={i}>
          <line x1={padL} y1={y(v)} x2={W - padR} y2={y(v)}
            stroke={v === 0 ? C.muted : C.line} strokeWidth={v === 0 ? 1.2 : 1}
            strokeDasharray={v === 0 ? "" : "2 4"} opacity={v === 0 ? 0.9 : 0.55} />
          <text x={padL - 9} y={y(v) + 4} textAnchor="end" fill={v === 0 ? C.text : C.muted}
            fontSize="11.5" fontFamily={mono}>{fm(v)}</text>
        </g>
      ))}
      {/* x labels */}
      {Array.from({ length: yrs + 1 }, (_, i) => i).filter((i) => i % yearEvery === 0).map((i) => (
        <text key={i} x={x(Math.min(N - 1, i * 12))} y={H - 9} textAnchor="middle"
          fill={C.muted} fontSize="11.5" fontFamily={mono}>Y{i}</text>
      ))}
      {/* halving markers (first ≈Apr 2028, then every 48 months) */}
      {showHalving && Array.from({ length: Math.ceil((N - halvingMo) / 48) }, (_, k) => halvingMo + k * 48)
        .filter((hm) => hm < N).map((hm, k) => (
          <g key={"h" + k}>
            <line x1={x(hm)} y1={padT} x2={x(hm)} y2={H - padB}
              stroke={C.red} strokeWidth="1" strokeDasharray="3 4" opacity="0.7" />
            <text x={x(hm) + 5} y={padT + 10} fill={C.red} fontSize="10"
              fontFamily={mono} letterSpacing=".08em">{k === 0 ? "HALVING" : "HALVING " + (k + 1)}</text>
          </g>
        ))}
      {/* series */}
      {series.map((s, i) => (
        <path key={i} d={path(s.arr)} fill="none" stroke={s.color} strokeWidth={s.w} strokeDasharray={s.dash} strokeLinejoin="round" />
      ))}
    </svg>
  );
}

/* ---------- shareable scenario state (URL hash) ----------
   Encodes only the inputs that differ from DEFAULTS, plus the market mode,
   so a rep can send a configured link. No backend, no storage. */
function clampVal(k, raw) {
  const d = DEFAULTS[k]; if (!d) return raw;
  const lo = d.min ?? -Infinity, hi = d.max ?? Infinity;
  const n = parseFloat(raw);
  return isNaN(n) ? d.v : Math.min(hi, Math.max(lo, n));
}
function encodeState(a, dynamic) {
  const vals = {};
  Object.keys(DEFAULTS).forEach((k) => {
    if (a[k] && a[k].v !== DEFAULTS[k].v) vals[k] = a[k].v;
  });
  const payload = { d: dynamic ? 1 : 0, v: vals };
  return encodeURIComponent(JSON.stringify(payload));
}
function decodeState() {
  try {
    const h = (location.hash || "").replace(/^#/, "");
    if (!h) return null;
    const p = JSON.parse(decodeURIComponent(h));
    if (!p || typeof p !== "object") return null;
    // NOTE: links shared before v4 may carry a `w` (tab) key and rent-to-own inputs.
    // Both are ignored here; buildA() drops any key no longer in DEFAULTS.
    return { dynamic: p.d !== 0, vals: p.v || {} };
  } catch (e) { return null; }
}
function buildA(vals) {
  const a = {};
  Object.keys(DEFAULTS).forEach((k) => {
    a[k] = { ...DEFAULTS[k], v: vals && vals[k] !== undefined ? clampVal(k, vals[k]) : DEFAULTS[k].v };
  });
  return a;
}

/* ============================================================ app */
function App() {
  const boot = useMemo(decodeState, []); // restore a shared scenario from the URL hash, once
  const [dynamic, setDynamic] = useState(boot ? boot.dynamic : true);
  const [a, setA] = useState(boot ? buildA(boot.vals) : applyPatch(DEFAULTS, PRESETS.bridge.patch));
  const [preset, setPreset] = useState(boot ? null : "bridge"); // a shared link is a custom scenario
  // Customer-friendly view: Simple by default (4 core inputs), Advanced reveals the full rail.
  // A shared/tuned link opens in Advanced so the recipient can see the custom assumptions.
  const [simple, setSimple] = useState(!boot);
  const [showDetail, setShowDetail] = useState(false); // steady-state annual table collapsed by default
  const [showExec, setShowExec] = useState(false);     // executive summary collapsed on screen, always printed
  const [focus, setFocus] = useState("rent"); // which deal shape the headline speaks to: rent | own | grid
  const [copied, setCopied] = useState(false);
  const [live, setLive] = useState(null); // { state:'loading'|'ok'|'err', msg }
  // top-level mode: "A" = "Does mining pay?" (neutral front door) · "B" = "Power a site" (the

  const [mode, setMode] = useState(boot ? "B" : "A");
  // Mode B site sizing: "kw" = enter power directly · "gas" = enter MCF/day, derive kW
  const [sizeBy, setSizeBy] = useState("kw");
  const editA = (next) => { setPreset(null); setA(next); }; // manual edits leave preset mode
  // keep the URL hash in sync so the current scenario is always shareable
  useEffect(() => {
    history.replaceState(null, "", "#" + encodeState(a, dynamic));
  }, [a, dynamic]);
  const copyLink = async () => {
    const url = location.href.split("#")[0] + "#" + encodeState(a, dynamic);
    try { await navigator.clipboard.writeText(url); setCopied(true); setTimeout(() => setCopied(false), 1600); }
    catch (e) { window.prompt("Copy this shareable link:", url); }
  };
  // Soft capture — email this scenario to yourself, a colleague, or 2G. Plain mailto: no backend,
  // no form service, nothing leaves the browser until the user hits send in their own mail app.
  // A mailto can't attach a PDF, so the body carries the live scenario link + the headline numbers
  // and points at PRINT / PDF for the one-pager. Recipient is blank on purpose — the user chooses.
  const emailScenario = () => {
    const url = location.href.split("#")[0] + "#" + encodeState(a, dynamic);
    const rig = activeRig(a);
    const lines = mode === "A"
      ? [
          `Rig: ${rig ? rig.name : "Custom"} — ${fmt(a.hashTH.v)} TH/s @ ${fmt(a.drawKW.v, 2)} kW`,
          `Power cost: ${fmt(a.powerCost.v, 1)}¢/kWh · Size: ${fmt(a.siteKW.v)} kW (${fmt(mA.nASIC)} miners)`,
          `Bitcoin price used: ${money(a.btcPrice.v)}`,
          ``,
          `Profit per day: ${money(mA.profitDay)}${mA.profitDay >= 0 ? ` (${fmt(mA.margin * 100, 0)}% margin)` : " (loss)"}`,
          `Break-even power cost: ${mA.bePowerCost != null ? fmt(mA.bePowerCost, 1) + "¢/kWh" : "—"}`,
          `Break-even BTC price: ${money(mA.beBTC)}`,
        ]
      : [
          `Site: ${fmt(a.siteKW.v)} kW · Gas ${money(a.gasPrice.v, 2)}/MCF · ${fmt(a.years.v)}-year comparison`,
          `Bitcoin price used: ${money(a.btcPrice.v)}`,
          ``,
          `Rent power from 2G: ${money(m.rent.net)} net cash`,
          `Buy your own gensets: ${money(m.own.net)} net cash`,
          `Buy grid power: ${money(m.grid.net)} net cash`,
        ];
    const body = lines.join("\n")
      + `\n\nOpen this exact scenario (every input rides in the link):\n${url}`
      + `\n\nFor a one-page PDF, open the link and use PRINT / PDF → "Save as PDF".`
      + `\n\nBudgetary only — not a quote. Built by 2G Energy Rental.`;
    window.location.href = "mailto:"
      + `?subject=${encodeURIComponent("My bitcoin mining scenario")}`
      + `&body=${encodeURIComponent(body)}`;
  };
  // Optional live refresh of BTC price + network hashrate from mempool.space (keyless, CORS-open).
  // Graceful: on any failure (offline, blocked, bad data) it keeps the current values and says so.
  const fetchLive = async () => {
    setLive({ state: "loading", msg: "Fetching live BTC price + network hashrate…" });
    const get = (url) => {
      const ctl = new AbortController();
      const t = setTimeout(() => ctl.abort(), 8000);
      return fetch(url, { signal: ctl.signal }).finally(() => clearTimeout(t));
    };
    const okNum = (n) => isFinite(n) && n > 0;
    // Each getter resolves to a good number or null — never throws — so one dead endpoint
    // can't sink the whole fetch. Price and hashrate are pulled independently, each with a
    // primary + fallback source (all keyless & CORS-open), so a blocked mempool still yields data.
    const priceGetters = [
      async () => { const j = await (await get("https://mempool.space/api/v1/prices")).json(); return Math.round(Number(j.USD)); },
      async () => { const j = await (await get("https://api.coinbase.com/v2/prices/BTC-USD/spot")).json(); return Math.round(Number(j.data.amount)); },
    ];
    const hashGetters = [
      async () => { const j = await (await get("https://mempool.space/api/v1/mining/hashrate/1m")).json(); return Math.round(Number(j.currentHashrate) / 1e18); }, // H/s → EH/s
      async () => { const t = await (await get("https://blockchain.info/q/hashrate")).text(); return Math.round(Number(t) / 1e9); },                             // GH/s → EH/s
    ];
    const firstOk = async (getters) => {
      for (const g of getters) { try { const v = await g(); if (okNum(v)) return v; } catch (e) { /* try next source */ } }
      return null;
    };
    const [usd, eh] = await Promise.all([firstOk(priceGetters), firstOk(hashGetters)]);
    if (usd == null && eh == null) {
      // Nothing came back. The usual cause is running the raw file from disk (file://), where
      // the browser blocks the live call — say so plainly instead of a generic failure.
      const hint = location.protocol === "file:"
        ? "Open the hosted link, not the local file — live fetch is blocked when the page runs from disk."
        : "Offline or the network blocked the request — kept current values.";
      setLive({ state: "err", msg: "Live fetch failed. " + hint });
      return;
    }
    setA((prev) => {
      const next = {};
      Object.keys(prev).forEach((k) => (next[k] = { ...prev[k] }));
      if (usd != null) next.btcPrice = { ...next.btcPrice, v: usd };
      if (eh != null) next.netHashEH = { ...next.netHashEH, v: eh };
      return next;
    });
    setPreset(null);
    const t = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    const parts = [];
    if (usd != null) parts.push(`BTC $${usd.toLocaleString()}`);
    if (eh != null) parts.push(`${eh.toLocaleString()} EH/s`);
    const partial = (usd == null || eh == null) ? " · partial" : "";
    setLive({ state: "ok", msg: `Live: ${parts.join(" · ")} · ${t}${partial}` });
  };
  const applyPreset = (key) => {
    const p = PRESETS[key].patch;
    const next = {};
    Object.keys(a).forEach((k) => (next[k] = { ...a[k], v: p[k] !== undefined ? p[k] : a[k].v }));
    setA(next);
    setPreset(key);
  };
  const m = useMemo(() => computeModel(a, dynamic), [a, dynamic]);
  const mA = useMemo(() => computeModeA(a), [a]); // Mode A snapshot
  const sens = useMemo(() => scenarios(a, dynamic), [a, dynamic]);
  const be = useMemo(() => breakEvenBTC(a, dynamic), [a, dynamic]); // BTC where 2G advantage → 0 (RELATIVE)
  const viable = useMemo(() => viableBTC(a, dynamic), [a, dynamic]); // BTC where best 2G net → 0 (ABSOLUTE)

  // ---- deal shape in focus: which of the three the headline takeaway + net-cash banner speak to.
  // The full three-way comparison always renders below; this only reframes the top so a rep can
  // walk each shape on its own. Default = renting 2G power (2G's offer).
  const SHAPES = {
    rent: { key: "rent", btn: "BUY ASICS · RENT POWER (2G)", verb: "renting power from 2G", color: C.green,
      net: m.rent.net, npv: m.rent.npv,
      desc: "You buy the miners and rent your power from 2G — deployed from inventory in weeks, guaranteed uptime, no generators to buy." },
    own: { key: "own", btn: "BUY ASICS · BUY GENSETS", verb: "buying your own gensets", color: C.owned,
      net: m.own.net, npv: m.own.npv,
      desc: "You buy the miners and buy your own gensets — the full DIY build. Big up-front capital and you wait on genset lead times." },
    grid: { key: "grid", btn: "BUY ASICS · WAIT FOR GRID", verb: "waiting for grid power", color: C.grid,
      net: m.grid.net, npv: m.grid.npv,
      desc: "You buy the miners and wait for a utility interconnection — cheapest power on paper, but a multi-year queue before first hash." },
  };
  const fp = SHAPES[focus] || SHAPES.rent;
  const fProfit = fp.net >= 0;
  // The headline compares the focused shape to its most relevant alternative: for 2G rental that's
  // buying your own gensets; for the DIY/grid shapes it's 2G rental (keeps the comparison 2G-centric).
  const cmpNet = focus === "rent" ? m.own.net : m.rent.net;
  const cmpNpv = focus === "rent" ? m.own.npv : m.rent.npv;
  const cmpLabel = focus === "rent" ? "buying your own gensets" : "renting from 2G";
  // A negative net cash has two very different causes, and naming the wrong one sends the customer
  // to fix the wrong thing:
  //   (a) OPERATING — mining revenue doesn't cover the power bill. The site bleeds every month.
  //   (b) CAPITAL — the power pays fine, but the equipment doesn't earn itself back inside the
  //       horizon (buy $4.9M of rigs, run 2 years, and the window closes before payback).
  // Steady-state operating cash flow (`ocf`) tells them apart: positive ocf = case (b).
  const shapeSteady = focus === "own" ? m.sOwn : focus === "grid" ? m.sGrid : m.sRent;
  const capexDriven = !fProfit && shapeSteady.ocf > 0;
  const paybackYrs = shapeSteady.payback;   // years to earn back the capital at the steady-state run rate
  // same test, fixed on the rent path — the exec summary is rent-centric regardless of the focus buttons
  const rentCapexDriven = m.rent.net < 0 && m.sRent.ocf > 0;
  // THE PITCH IS HORIZON-BOUNDED, and the tool says so before a customer works it out. Renting wins
  // on net cash while the owned path is still carrying its lead time and unamortized iron; run it
  // long enough and owning takes both the cash race and the ¢/kWh race. Scanning the model beats
  // asserting it — these two boundaries are the honest edges of the rental argument.
  const bounds = useMemo(() => {
    let advUntil = null, ownCheaperAt = null;
    for (let y = 1; y <= 20; y++) {
      const alt = computeModel({ ...a, years: { ...a.years, v: y } }, dynamic);
      if (alt.rent.net >= alt.own.net) advUntil = y;
      if (ownCheaperAt == null && alt.own.deliveredPowerCost != null && alt.rent.deliveredPowerCost != null
        && alt.own.deliveredPowerCost <= alt.rent.deliveredPowerCost) ownCheaperAt = y;
    }
    return { advUntil, ownCheaperAt };
  }, [a, dynamic]);
  // "Run it longer and the rigs clear payback" is intuitive and OFTEN WRONG here: payback is computed
  // on today's network, while the model grows difficulty and applies the halving, so a longer window
  // can make things worse. Never offer the lever on faith — re-run the model at the longer horizon
  // and only suggest it if it actually helps.
  const longerHorizon = useMemo(() => {
    if (!capexDriven || !paybackYrs) return null;
    const y = Math.min(a.years.max || 20, Math.ceil(paybackYrs));
    if (y <= a.years.v) return null;
    const alt = computeModel({ ...a, years: { ...a.years, v: y } }, dynamic);
    const net = focus === "own" ? alt.own.net : focus === "grid" ? alt.grid.net : alt.rent.net;
    return { years: y, net, helps: net > fp.net, pays: net >= 0 };
  }, [a, dynamic, capexDriven, paybackYrs, focus, fp.net]);

  const groups = {};
  Object.keys(DEFAULTS).forEach((k) => {
    const grp = DEFAULTS[k].grp;
    if (grp === "Mode A") return; // Mode-A-only inputs don't belong in the site-power rail
    if (k === "siteKW") return;   // sized via the SiteSizer (kW / MCF-day toggle) instead
    (groups[grp] = groups[grp] || []).push(k);
  });

  const yrs = Math.round(m.months / 12);
  const advPositive = m.advantage >= 0;
  // Does the site make money AT ALL? `advantage` is only 2G-vs-owned (a gap between two
  // outcomes that can both be losses), so the banner leads with this absolute verdict instead.
  const profitable = m.best2G >= 0;
  // When a project doesn't pencil, name the concrete levers that would flip it, so a losing
  // scenario becomes a next step instead of a dead end. Ordered most-actionable first.
  const fixHint = (() => {
    if (profitable) return "";
    const parts = [];
    // A capital-payback shortfall needs the OPPOSITE horizon advice from an operating loss:
    // stretch the comparison out past payback, don't shorten it into a bridge.
    if (capexDriven) {
      // only if re-running the model at that horizon actually improves the outcome
      if (longerHorizon && longerHorizon.helps) parts.push(`compare over ${longerHorizon.years} years so the miners clear payback`);
      if (viable != null) parts.push(`get BTC above ${money(viable)}`);
      parts.push("or negotiate the rig price down");
      const tail = longerHorizon && !longerHorizon.helps
        ? ` A longer horizon won't do it — difficulty growth and the halving outrun the payback.`
        : "";
      return parts.length ? `To make it pencil: ${parts.join(", ")}.${tail}` : "";
    }
    if (viable != null) parts.push(`get BTC above ${money(viable)}`);
    if (a.years.v > 2) parts.push("shorten to a ~2-year bridge through the halving");
    return parts.length ? `To make it pencil: ${parts.join(", ")}.` : "";
  })();
  // The fix-lever card is the last card of the pitch when it renders, so it carries the print page
  // break; beat 3 carries it otherwise. Page 1 of the leave-behind is the pitch, always.
  const fixHintShows = !fProfit && !!fixHint;
  // shared phrasing for the takeaway card + executive summary, so they can never disagree
  const mwv = a.siteKW.v / 1000;
  const siteTxt = mwv >= 1 ? `${fmt(mwv, mwv < 10 ? 1 : 0)} MW` : `${fmt(a.siteKW.v, 0)} kW`;
  // Every headline that quotes the BTC price also quotes the growth assumption riding underneath it.
  // A reader who sees "BTC $63k" and doesn't know the model drifts it upward has been misled.
  const growTxt = dynamic && a.priceGrowth.v !== 0
    ? ` ${a.priceGrowth.v > 0 ? "+" : ""}${fmt(a.priceGrowth.v, 1)}%/yr`
    : "";
  const btcTxt = (a.btcPrice.v >= 1000
    ? `BTC $${fmt(a.btcPrice.v / 1000, a.btcPrice.v % 1000 === 0 ? 0 : 1)}k`
    : `BTC ${money(a.btcPrice.v)}`) + growTxt;


  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: FONT, padding: "0 0 60px" }}>

      {/* header — logo (never "2G" as text) + headline-underline title */}
      <div style={{ background: C.panel, borderBottom: `1px solid ${C.line}`, padding: "18px 28px", display: "flex", alignItems: "center", gap: 20, flexWrap: "wrap" }}>
        {/* honest attribution — 2G built it, but the tool leads with the miner's question, not a pitch */}
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, flexShrink: 0 }}>
          <span style={{ fontFamily: mono, fontSize: 7.5, letterSpacing: ".16em", color: C.muted, textTransform: "uppercase" }}>Built by</span>
          <img src={LOGO_2G_URI} alt="2G Energy Rental" style={{ height: 30, width: 30 * LOGO_RATIO, display: "block" }} />
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
          {/* headline with the 2G light-green highlighter device behind the lower third of the text */}
          <div style={{ whiteSpace: "nowrap", lineHeight: 1.15 }}>
            <span style={{
              fontFamily: FONT, fontWeight: 700, fontSize: "clamp(19px, 4.6vw, 34px)", color: "#333",
              backgroundImage: `linear-gradient(180deg, transparent 58%, ${C.greenLt} 58%)`,
              padding: "0 5px 3px", boxDecorationBreak: "clone", WebkitBoxDecorationBreak: "clone",

              Bitcoin Mining Calculator
            </span>
          </div>
          <div style={{ fontFamily: mono, fontSize: 11, color: C.muted, letterSpacing: ".04em" }}>
            Will your mine pay? Check any rig against your real power cost — grid, gas, or hosted. · <strong style={{ color: C.text }}>budgetary, not a quote</strong>
          </div>
        </div>
        <div className="no-print" style={{ marginLeft: "auto", display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
          <button
            onClick={() => window.print()}
            style={{ padding: "8px 14px", background: C.green, border: "none", color: "#fff", fontFamily: mono, fontSize: 12, fontWeight: 700, borderRadius: 4, cursor: "pointer" }}>
            ⬇ PRINT / PDF
          </button>
          <button
            onClick={copyLink}
            style={{ padding: "8px 14px", background: "transparent", border: `1px solid ${C.green}`, color: C.green, fontFamily: mono, fontSize: 12, fontWeight: 700, borderRadius: 4, cursor: "pointer" }}>
            {copied ? "✓ LINK COPIED" : "🔗 COPY LINK"}
          </button>
          <button
            onClick={emailScenario}
            title="Opens your email app with this scenario — nothing is sent until you hit send"
            style={{ padding: "8px 14px", background: "transparent", border: `1px solid ${C.line}`, color: C.muted, fontFamily: mono, fontSize: 12, fontWeight: 700, borderRadius: 4, cursor: "pointer" }}>
            ✉ EMAIL IT
          </button>
        </div>
      </div>

      {/* mode switcher — A: "does mining pay?" (neutral front door) · B: "power a site" */}
      <div className="no-print" style={{ display: "flex", justifyContent: "center", gap: 8, padding: "16px 20px 0", flexWrap: "wrap" }}>
        <button style={{ ...segBtn(mode === "A"), flex: "none", padding: "9px 18px" }} onClick={() => setMode("A")}>DOES MINING PAY?</button>
        <button style={{ ...segBtn(mode === "B"), flex: "none", padding: "9px 18px" }} onClick={() => setMode("B")}>POWER A SITE</button>
      </div>

      {mode === "A" && (
        <ModeAView a={a} setA={editA} mA={mA} live={live} fetchLive={fetchLive}

      <div className="proforma-grid" style={{ display: mode === "B" ? "grid" : "none", gridTemplateColumns: "290px 1fr", gap: 22, padding: "22px 28px", maxWidth: 1300, margin: "0 auto" }}>

          {/* ---------- assumptions rail ---------- */}
          <div className="no-print">
            {simple ? (

                <SectionTitle>The basics</SectionTitle>
                <div style={{ fontSize: 11, color: C.muted, marginBottom: 14, lineHeight: 1.5 }}>

                </div>
                <SiteSizer a={a} setA={editA} sizeBy={sizeBy} setSizeBy={setSizeBy} />
                <NumInput k="gasPrice" a={a} setA={editA} label="Your gas price ($/MCF)" tip="Price of the stranded or flared gas that fuels the gensets, per thousand cubic feet (MCF). Cheaper gas = cheaper power." />
                <NumInput k="btcPrice" a={a} setA={editA} label="Bitcoin price ($)"   tip="Today's BTC price — it drives mining revenue. Use ↻ Fetch live below to pull the current spot price." />
                <NumInput k="years"    a={a} setA={editA} label="Years to compare"    tip="The head-to-head horizon. All net-cash and payback figures are measured over this many years." />
                <CoolingToggle a={a} setA={editA} />
                <button

                  {live && live.state === "loading" ? "↻ FETCHING…" : "↻ FETCH LIVE BTC"}
                </button>
                {live && (
                  <div style={{ fontSize: 10, lineHeight: 1.45, marginBottom: 10, fontFamily: mono,
                    color: live.state === "err" ? C.red : live.state === "ok" ? C.green : C.muted }}>
                    {live.msg}

                <button

                  ⚙ ADVANCED — ALL ASSUMPTIONS

            ) : (

                <span style={{ fontFamily: mono, fontSize: 10.5, letterSpacing: ".1em", textTransform: "uppercase", color: C.muted, marginRight: 4 }}>Deal shape</span>
                {Object.values(SHAPES).map((s) => (
                  <button key={s.key} style={{ ...segBtn(focus === s.key), flex: "none", padding: "8px 14px" }} onClick={() => setFocus(s.key)}>
                    {s.btn}
                  </button>
                ))}
              </div>
              <div style={{ fontSize: 11.5, color: C.muted, marginTop: 7, fontFamily: mono, lineHeight: 1.5 }}>
                {fp.desc}
              </div>
            </div>



            {/* ============================ THE PITCH, IN THREE BEATS ============================
                1. Mining is tight at this price — for everyone. Said first, plainly, no spin.
                2. If you're doing it anyway, renting beats buying generators by THIS much, THIS
                   much sooner — the claim that survives every assumption sweep, and the hero.
                3. Here's what power costs on each path, and what you'd need for it to clear.
                The absolute verdict is never hidden — it opens the sequence. A tool that buries the
                loss is one a miner stops trusting, and that trust is what makes beat 2 land. */}

            {/* ---- BEAT 1: the honest verdict ---- */}
            <div className="beat" style={{
              background: fProfit ? C.greenLt : C.panel2,
              border: `1px solid ${fProfit ? C.green : C.red}`,
              borderRadius: 6, padding: "13px 18px", marginBottom: 12, display: "flex", gap: 12, alignItems: "flex-start",
            }}>
              <span style={{ fontSize: 16, lineHeight: 1.4, flexShrink: 0 }}>{fProfit ? "💡" : "⚠️"}</span>
              <div className="beat-body" style={{ fontSize: 14, lineHeight: 1.5, color: "#1a1a1a", fontWeight: 500, flex: 1 }}>
                {/* Three states, and conflating them misreports the market: the focused shape clears;
                    it doesn't but another path does (a PATH problem); or nothing clears (a MARKET
                    problem). Only the last one gets the "tight for everyone" line. */}
                {fProfit
                  ? `At ${btcTxt}, this ${siteTxt} site pencils: ${fp.verb} nets ${moneyM(fp.net)} over ${yrs} years.`
                  : profitable
                    ? `At ${btcTxt}, ${fp.verb} doesn't clear over ${yrs} years — but ${cmpLabel} does, at ${moneyM(cmpNet)}. That's a choice of power, not a verdict on the site.`
                    : `At ${btcTxt}, new-rig mining is tight for everyone — this ${siteTxt} site doesn't clear over ${yrs} years on any power source. ${viable != null ? `It takes bitcoin above ${money(viable)}` : "It takes a higher bitcoin price"}${m.rent.bePowerCost != null && m.rent.bePowerCost > 0 ? `, or power under ${fmt(m.rent.bePowerCost, 1)}¢/kWh` : ""}. That's the market, not this site.`}
                {/* the levers live with the verdict — one card, not two: "here's the problem, here's
                    what would change it" is a single thought, and it keeps page 1 to three cards */}
                {fixHintShows && (
                  <div style={{ fontSize: 12.5, color: C.green, fontWeight: 700, marginTop: 7, lineHeight: 1.45 }}>
                    {fixHint}
                  </div>
                )}
              </div>
            </div>

            {/* ---- BEAT 2: the hero — what renting is worth against building your own ---- */}
            <div className="beat" style={{ background: C.panel, border: `2px solid ${advPositive ? C.green : C.owned}`, borderRadius: 6, padding: "18px 22px", marginBottom: 12, display: "flex", gap: 28, alignItems: "center", flexWrap: "wrap" }}>
              <div style={{ minWidth: 260, flex: "1 1 340px" }}>
                <div style={{ fontFamily: mono, fontSize: 10.5, letterSpacing: ".12em", textTransform: "uppercase", color: C.muted }}>
                  {fp.verb} vs {cmpLabel} · {yrs} years
                </div>
                <div className="beat-hero" style={{ fontFamily: mono, fontSize: 40, fontWeight: 600, color: (fp.net - cmpNet) >= 0 ? C.green : C.owned, lineHeight: 1.15 }}>
                  {money(Math.abs(fp.net - cmpNet))}
                </div>
                <div style={{ fontSize: 14, color: C.text, fontWeight: 700, maxWidth: 470, lineHeight: 1.45 }}>
                  {(fp.net - cmpNet) >= 0 ? "better" : "worse"} than {cmpLabel}
                  {focus === "rent" && dynamic && m.firstHashOwn > m.firstHashRent
                    ? `, and hashing ${fmt(m.firstHashOwn - m.firstHashRent, 0)} months sooner`
                    : ""}.
                </div>
                <div className="beat-sub" style={{ fontSize: 12.5, color: C.muted, marginTop: 6, maxWidth: 470, lineHeight: 1.5 }}>
                  {money(fp.net)} vs {money(cmpNet)} over {yrs} years
                  {fp.net < 0 && cmpNet < 0 && " — both lose at this bitcoin price"}
                  {focus === "rent" ? `, and renting sinks none of your capital into ${money(m.genCapex)} of generators.` : "."}
                  {m.discRate > 0 && ` NPV @ ${fmt(m.discRate)}%: ${money(fp.npv - cmpNpv)} advantage.`}
                </div>
                {/* the boundary of the claim, stated by us rather than discovered by the customer */}
                {focus === "rent" && bounds.advUntil != null && (
                  <div className="beat-sub" style={{ fontSize: 11.5, color: C.muted, marginTop: 6, maxWidth: 470, lineHeight: 1.5 }}>
                    {bounds.advUntil >= 20
                      ? "Renting stays ahead at every horizon this model runs."
                      : `Renting stays ahead out to about ${bounds.advUntil} years. Run it longer and owned generators win — the iron is paid off by then, if mining still pays and you still want it.`}
                  </div>
                )}
              </div>
              <div style={{ display: "flex", gap: 24, marginLeft: "auto", flexWrap: "wrap" }}>
                {[
                  // Three tiles, not five. Uptime advantage (+13 pts) and the rent-vs-own flip price
                  // were true but not decisive, and every extra number costs the hero number attention.
                  // Both still live in the steady-state table and the executive summary.
                  ["First hash", dynamic ? `Mo ${fmt(m.firstHashRent)} vs Mo ${fmt(m.firstHashOwn)}` : "same day", "The month each path mines its first bitcoin. 2G deploys from inventory; owned generation waits on genset lead time."],
                  ["Genset cost avoided", money(m.genCapex), "Up-front cash you don't spend on buying generators — 2G supplies the fleet, so that capital stays in the business."],
                  ["Profitable above", viable == null ? "—" : money(viable), "The bitcoin price this project needs just to break even — below it, mining doesn't cover the cost of power on any path. This is the real go / no-go number."],
                ].map(([l, v, tip]) => (
                  <div key={l}>
                    <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: ".1em", textTransform: "uppercase", color: C.muted, display: "flex", alignItems: "center" }}>{l}{tip && <Info>{tip}</Info>}</div>
                    <div style={{ fontFamily: mono, fontSize: 19, fontWeight: 600, color: C.text }}>{v}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* ---- BEAT 3: what power actually costs on each path, and what it would have to cost ----
                All-in ¢/kWh over the SAME horizon: fuel + rental for 2G; fuel + maintenance +
                rebuilds + the generators themselves (net of resale) for owned; the utility bill +
                interconnection for grid. Paired with the break-even, the gap × kWh IS the net cash,
                so this card can never drift from the chart below it. */}
            <div className="beat pitch-end" style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 6, padding: "14px 18px", marginBottom: 12 }}>
              <div style={{ display: "flex", alignItems: "center", marginBottom: 2 }}>
                <SectionTitle>What power costs, all-in, over {yrs} years</SectionTitle>
                <Info>Every dollar each path spends to deliver a kWh — fuel, service, rebuilds and the generators themselves for owned; the rental rate and fuel for 2G; the utility bill and interconnection for grid. Divided by the kWh actually consumed over this horizon.</Info>

            {m.rent.net >= m.own.net && (
