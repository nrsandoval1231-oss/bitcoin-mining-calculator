                // BTC/day and implied hashprice dropped from the strip — one is redundant with revenue,
                // the other is industry jargon. Both remain in the steady-state table for anyone digging.
                ["ASICs deployed", fmt(m.nASIC, 0), "Number of mining machines the site's power can run. Each rig here is a current-gen " + (activeCooling(a) ? COOLING[activeCooling(a)].name + " " : "") + "ASIC."],
                ["Fleet hashrate", fmt(m.fleetTH / 1000, 0) + " PH/s", "Total computing power of the fleet. PH/s = petahash per second (1,000 TH/s). More hashrate = a bigger share of the network's rewards."],
                ["Rev / day @ 100%, today", money(m.baseRevDay), "Daily mining revenue in dollars at full uptime and today's BTC price, before power and pool costs."],
              ].map(([l, v, tip]) => (
                <div key={l} style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 6, padding: "10px 12px" }}>
                  <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: ".08em", textTransform: "uppercase", color: C.muted, display: "flex", alignItems: "center" }}>{l}{tip && <Info>{tip}</Info>}</div>
                  <div style={{ fontFamily: mono, fontSize: 17, fontWeight: 600, color: C.text, marginTop: 2 }}>{v}</div>
                </div>
              ))}
            </div>

            {/* cost-check strip — per-ASIC price + up-front capital, laid out so a buyer can verify
                the numbers at a glance. This is the capital-preservation story in one card. */}
            {(() => {
              const upfront2G = m.hwCapex;                 // miners only — gensets are rented
              const upfrontOwn = m.hwCapex + m.genCapex;   // miners + gensets bought outright
              const CostRow = ({ label, detail, amount, strong, tone }) => (
                <div style={{ display: "flex", alignItems: "baseline", gap: 10, padding: "7px 0", borderBottom: `1px solid ${C.line}` }}>
                  <div style={{ fontSize: 13, fontWeight: strong ? 700 : 500, color: tone || C.text, whiteSpace: "nowrap" }}>{label}</div>
                  <div style={{ fontSize: 11.5, color: C.muted, fontFamily: mono, flex: 1, textAlign: "right", minWidth: 0, overflow: "hidden", textOverflow: "ellipsis" }}>{detail}</div>
                  <div style={{ fontFamily: mono, fontSize: strong ? 15 : 13.5, fontWeight: strong ? 700 : 500, color: tone || C.text, textAlign: "right", width: 118, whiteSpace: "nowrap" }}>{amount}</div>
                </div>
              );
              return (
                <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 6, padding: "14px 18px", marginBottom: 14 }}>
                  <div style={{ display: "flex", alignItems: "center", marginBottom: 6 }}>
                    <SectionTitle>What it costs to start</SectionTitle>
                    <Info>Up-front cash to get mining. Renting 2G power means you buy no generators — the biggest line item — so your capital goes into miners, not iron you can't un-buy.</Info>
                  </div>
                  <CostRow
                    label="Miners (ASICs)"
                    detail={`${fmt(m.nASIC, 0)} units × ${money(a.asicPrice.v)} each`}
                    amount={money(m.hwCapex)} />
                  <CostRow
                    label="2G generators"
                    detail={`rented · ${money(a.rentalRate.v)}/kW/mo, nothing up front`}
                    amount="$0" />
                  <div style={{ height: 6 }} />
                  <CostRow
                    label="Up-front to rent 2G"
                    detail="miners only — no generators to buy"
                    amount={money(upfront2G)} strong tone={C.green} />
                  <CostRow
                    label="Up-front to build your own"
                    detail={`+ ${money(m.genCapex)} in gensets (${money(a.msrpPerKW.v)}/kW × ${fmt(a.siteKW.v, 0)} kW)`}
                    amount={money(upfrontOwn)} tone={C.owned} />
                  <div style={{ marginTop: 9, fontSize: 12.5, color: C.text }}>
                    <strong style={{ color: C.green }}>{money(m.genCapex)}</strong> of capital stays in your pocket by renting instead of buying generators.
                  </div>
                </div>
              );
            })()}

            {/* cumulative cash chart */}
            <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 6, padding: 18, marginBottom: 14 }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 14, flexWrap: "wrap" }}>
                <div style={{ flex: 1, minWidth: 260 }}>
                  <SectionTitle>Cumulative cash position — {yrs} years{dynamic ? " (lead times, halving & difficulty growth modeled)" : " (static snapshot)"}</SectionTitle>
                </div>
                <div className="no-print" style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontFamily: mono, fontSize: 10.5, letterSpacing: ".08em", textTransform: "uppercase", color: C.muted }}>Horizon</span>
                  <button style={{ ...segBtn(false), flex: "none", width: 30, padding: "6px 0" }}
                    onClick={() => setA({ ...a, years: { ...a.years, v: Math.max(a.years.min, a.years.v - 1) } })}>−</button>
                  <div style={{ width: 44, textAlign: "center", fontFamily: mono, fontSize: 15, color: C.green, fontWeight: 600 }}>{fmt(a.years.v)} yr</div>
                  <button style={{ ...segBtn(false), flex: "none", width: 30, padding: "6px 0" }}
                    onClick={() => setA({ ...a, years: { ...a.years, v: Math.min(a.years.max, a.years.v + 1) } })}>+</button>
                </div>
              </div>
              <div style={{ display: "flex", gap: 18, marginBottom: 8, fontFamily: mono, fontSize: 11.5, flexWrap: "wrap" }}>
                <span style={{ color: C.green, fontWeight: 700 }}>■ Rent power from 2G</span>
                <span style={{ color: C.owned }}>■ Buy your own gensets</span>
                <span style={{ color: C.grid }}>■ Buy grid power</span>
                {dynamic && a.halvingMo.v < m.months && <span style={{ color: C.red }}>┆ halving (issuance −50%)</span>}
              </div>
              <div style={{ fontSize: 11.5, color: C.muted, marginBottom: 8, lineHeight: 1.5 }}>
                You buy the miners (ASICs) in every case — the only difference is the power: rent it from 2G, buy your own gensets, or buy grid power.
              </div>
              <CashChart m={m} halvingMo={a.halvingMo.v} dynamic={dynamic} />
              <div className="x-scroll">
              <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 12 }}>
                <thead>
                  <tr style={{ borderBottom: `2px solid ${C.line}` }}>
                    {["Path", "First hash", <span key="tv">Generators left at end<Info>What your generators are worth at the end. Owned gensets keep a resale value; with 2G rental you own no generators, so there's nothing to resell — and nothing that can strand if mining slows.</Info></span>, `Net cash @ ${yrs} yrs`, ...(m.discRate > 0 ? [`NPV @ ${fmt(m.discRate)}%`] : [])].map((h, i) => (
                      <th key={i} style={{ padding: "6px 10px", fontFamily: mono, fontSize: 10.5, letterSpacing: ".06em", textTransform: "uppercase", color: i === 4 ? C.green : C.muted, textAlign: i === 0 ? "left" : "right", fontWeight: i === 4 ? 700 : 500 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[
                    ["Rent power from 2G", m.firstHashRent, 0, m.rent.net, m.rent.npv, C.green, "rent"],
                    ["Buy your own gensets", m.firstHashOwn, m.own.terminal, m.own.net, m.own.npv, C.owned, "own"],
                    ["Buy grid power", m.firstHashGrid, m.grid.terminal, m.grid.net, m.grid.npv, C.grid, "grid"],
                  ].map(([name, fh, term, net, npv, col, fkey]) => (
                    <tr key={name} style={{ borderBottom: `1px solid ${C.line}`, background: fkey === focus ? col + "14" : "transparent" }}>
                      <td style={{ padding: "7px 10px", fontSize: 13, color: col, fontWeight: 600 }}>{fkey === focus ? "▶ " : ""}{name}</td>
                      <td style={{ padding: "7px 10px", fontFamily: mono, fontSize: 13, textAlign: "right" }}>{dynamic ? "Month " + fmt(fh) : "Day 1"}</td>
                      <td style={{ padding: "7px 10px", fontFamily: mono, fontSize: 13, textAlign: "right" }}>{money(term)}</td>
                      <td style={{ padding: "7px 10px", fontFamily: mono, fontSize: 14, textAlign: "right", color: col, fontWeight: 600 }}>{money(net)}</td>
                      {m.discRate > 0 && <td style={{ padding: "7px 10px", fontFamily: mono, fontSize: 14, textAlign: "right", color: col, fontWeight: 600 }}>{money(npv)}</td>}
                    </tr>
                  ))}
                </tbody>
              </table>
              </div>
            </div>

            {/* steady-state annual table */}
            <div className="print-tall x-scroll" style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 6, padding: "14px 8px 6px", marginBottom: 14, overflowX: "auto" }}>
              <div style={{ padding: "0 10px" }}>
                <SectionTitle>Steady-state annual run rate — both systems deployed, today's network</SectionTitle>
                <button
                  className="no-print"
                  onClick={() => setShowDetail((s) => !s)}
                  style={{ ...segBtn(false), width: "100%", marginBottom: showDetail ? 12 : 0, textAlign: "left", padding: "8px 12px" }}>
                  {showDetail ? "▾ HIDE THE DETAILED ANNUAL NUMBERS" : "▸ SHOW THE DETAILED ANNUAL NUMBERS"}
                </button>
              </div>
              <div className="detail-body" style={{ display: showDetail ? "block" : "none" }}>
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead>
                  <tr style={{ borderBottom: `2px solid ${C.line}` }}>
                    {["", `Own gensets (${fmt(a.ownUptime.v)}% uptime)`, `Rent 2G (${fmt(a.rentUptime.v)}% guaranteed)`, `Buy grid (${fmt(a.gridUptime.v)}% uptime)`, "2G vs own"].map((h, i) => (
                      <th key={i} style={{ padding: "6px 10px", fontFamily: mono, fontSize: 10.5, letterSpacing: ".06em", textTransform: "uppercase", color: i === 2 ? C.green : i === 3 ? C.grid : C.muted, textAlign: i === 0 ? "left" : "right", fontWeight: i === 2 ? 700 : 500 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  <Head label="Generation & energy" />
                  <Row label="Annual kWh delivered" own={m.sOwn.kwh} rent={m.sRent.kwh} grid={m.sGrid.kwh} diff={m.sRent.kwh - m.sOwn.kwh} unit="" />
                  <Row label="Annual MCF gas consumed" own={m.sOwn.mcf} rent={m.sRent.mcf} grid={m.sGrid.mcf} diff={m.sRent.mcf - m.sOwn.mcf} unit="" />
                  <Head label="Mining revenue (after pool fee)" />
                  <Row label="Gross mining revenue" own={m.sOwn.rev} rent={m.sRent.rev} grid={m.sGrid.rev} diff={m.sRent.rev - m.sOwn.rev} strong />
                  <Head label="Operating expenses" />
                  <Row label="Fuel / gas cost" own={m.sOwn.fuel} rent={m.sRent.fuel} grid={0} diff={m.sRent.fuel - m.sOwn.fuel} goodIsPositive={false} />
                  <Row label="Rental expense" own={0} rent={m.sRent.rental} grid={0} diff={m.sRent.rental} goodIsPositive={false} />
                  <Row label="Grid power purchased" own={0} rent={0} grid={m.sGrid.power} diff={0} goodIsPositive={false} />
                  <Row label="Maintenance, parts & labor" own={m.sOwn.maint} rent={0} grid={0} diff={-m.sOwn.maint} goodIsPositive={false} />
                  <Row label="Other site opex" own={m.sOwn.other} rent={0} grid={0} diff={-m.sOwn.other} goodIsPositive={false} />
                  <Row label="Total operating expenses" own={m.sOwn.opex} rent={m.sRent.opex} grid={m.sGrid.opex} diff={m.sRent.opex - m.sOwn.opex} strong goodIsPositive={false} />
                  <Head label="Cash flow" />
                  <Row label="Operating cash flow" own={m.sOwn.ocf} rent={m.sRent.ocf} grid={m.sGrid.ocf} diff={m.sRent.ocf - m.sOwn.ocf} strong />
                  <Row label="Initial CapEx (power + miners)" own={m.sOwn.capex} rent={m.sRent.capex} grid={m.sGrid.capex} diff={m.sRent.capex - m.sOwn.capex} goodIsPositive={false} />
                  <Row label="Simple payback (years)" own={m.sOwn.payback} rent={m.sRent.payback} grid={m.sGrid.payback} diff={null} unit="" d={1} />
                  <Head label="Key metrics" />
                  <Row label="Effective power cost (¢/kWh)" own={m.sOwn.powerCost} rent={m.sRent.powerCost} grid={m.sGrid.powerCost} diff={m.sRent.powerCost - m.sOwn.powerCost} unit="" d={2} goodIsPositive={false} />
                  <Row label={`LCOE (¢/kWh) @ ${fmt(a.years.v, 0)}-yr amortization`} own={m.sOwn.lcoe} rent={m.sRent.lcoe} grid={m.sGrid.lcoe} diff={null} unit="" d={2} />
                </tbody>
              </table>
              <div style={{ padding: "8px 10px", fontSize: 10.5, color: C.muted, fontFamily: mono, lineHeight: 1.5 }}>
                Snapshot at today's network — the multi-year chart above is where lead times, the halving, and difficulty growth are applied.
                Note the steady-state comparison alone favors owning; the 2G case is built on time-to-power, uptime, capital preservation, and exit optionality.
              </div>
              </div>
            </div>

            {/* exec summary — the longest block on the page by far, and the three beats above already
                carry the argument on screen. Collapsed by default; ALWAYS prints (.detail-body), because
                the one-pager is where a finance reader wants the full written case. */}
            <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 6, padding: 18 }}>
              <SectionTitle>Executive summary</SectionTitle>
              <button
                className="no-print"
                onClick={() => setShowExec((s) => !s)}
                style={{ ...segBtn(false), width: "100%", marginBottom: showExec ? 12 : 0, textAlign: "left", padding: "8px 12px" }}>
                {showExec ? "▾ HIDE THE FULL WRITE-UP" : "▸ READ THE FULL WRITE-UP"}
              </button>
              <div className="detail-body" style={{ display: showExec ? "block" : "none", fontSize: 13.5, lineHeight: 1.7, color: C.text }}>
                {/* Same three beats as the screen, in the same order, so the leave-behind and the live
                    conversation can't tell different stories. 1) the market, 2) the decision, 3) the
                    power cost. Each beat opens with the sentence a skimming reader should walk away with. */}

                {/* BEAT 1 — the market */}
                {profitable ? (
                  <>
                    <b style={{ color: C.green }}>At {btcTxt}, this project pencils.</b> Renting 2G power
                    nets {money(m.best2G)} over {yrs} years against {money(m.own.net)} for owned generation.{" "}
                  </>
                ) : (
                  <>
                    <b style={{ color: C.red }}>At {btcTxt}, new-rig mining is tight for everyone — this project doesn't clear over {yrs} years on any power source.</b>{" "}
                    Renting 2G power nets {money(m.best2G)} and owned generation {money(m.own.net)}. {rentCapexDriven
                      ? <>Mining does cover the power bill here; the shortfall is capital. The {money(m.sRent.capex)} of
                        equipment takes about <b>{m.sRent.payback ? fmt(m.sRent.payback, 1) : "—"} years</b> to earn back at
                        <i> today's</i> network, so a {yrs}-year window closes before payback — and because difficulty compounds
                        at {fmt(a.hashGrowth.v)}%/yr with the halving on top, {longerHorizon && longerHorizon.helps
                          ? <>stretching to {longerHorizon.years} years does help here</>
                          : <>a longer horizon does not rescue it</>}. The levers are cheaper hardware or a higher
                        bitcoin price{viable != null ? <> — this site clears above <b>{money(viable)}</b></> : ""}.</>
                      : <>Mining revenue does not cover the cost of power at these assumptions
                        {viable != null ? <>, which need BTC near <b>{money(viable)}</b> to clear</> : ""}.</>}{" "}
                    That is the market, not this site — and what follows is path selection, not a business case.{" "}
                  </>
                )}

                {/* BEAT 2 — the decision */}
                <b style={{ color: advPositive ? C.green : C.owned }}>
                  Renting power is {money(Math.abs(m.advantage))} {advPositive ? "better" : "worse"} than buying generators over {yrs} years
                </b>
                {!profitable && (advPositive ? <> — a smaller loss, not a profit</> : <>, and both are losses</>)}, and time to
                power is why. Factory lead times for MW-class natural gas gensets now run roughly a year or more, and large gas
                turbines are quoting 3–5 years, while a 2G rental fleet deploys from inventory in weeks: here the owned path
                hashes its first block in month {fmt(m.firstHashOwn)} against month {fmt(m.firstHashRent)} for 2G, and every
                month of waiting burns the richest remaining hashprice. Renting also avoids {money(m.genCapex)} of generation
                CapEx, carries a {fmt(a.rentUptime.v)}% uptime guarantee with full service (owner-operated wellhead fleets
                typically achieve 80–90%), and preserves the option to demobilize if mining economics deteriorate — owned iron
                cannot be un-bought.
                {bounds.advUntil != null && bounds.advUntil < 20 && (
                  <> <b>That advantage is horizon-bounded:</b> renting leads out to about {bounds.advUntil} years,
                    after which owned generators win on cash — the capital is amortized by then, if mining still pays and you
                    still want the iron.</>
                )}{" "}

                {/* BEAT 3 — the power cost */}
                <b>All-in, power costs {m.rent.deliveredPowerCost != null ? fmt(m.rent.deliveredPowerCost, 1) + "¢/kWh" : "—"} rented
                  from 2G against {m.own.deliveredPowerCost != null ? fmt(m.own.deliveredPowerCost, 1) + "¢/kWh" : "—"} on
                  owned generators over this horizon</b> — fuel, service, rebuilds and the generators themselves, divided by the
                kWh actually consumed. {bounds.ownCheaperAt != null && bounds.ownCheaperAt <= 20
                  ? <>Owned generation only undercuts the rental rate past about {bounds.ownCheaperAt} years, once that capital
                    is spread thin enough.</>
                  : <>Owned generation does not undercut the rental rate at any horizon this model runs.</>}{" "}
                {m.rent.bePowerCost != null && (m.rent.bePowerCost <= 0
                  ? <>This site would need power at <b>no cost at all</b> and still not clear inside {yrs} years — the hardware,
                    not the power, is what it can't carry.</>
                  : <>To break even over {yrs} years after paying for the miners, this site needs power at
                    or below <b>{fmt(m.rent.bePowerCost, 1)}¢/kWh</b>.</>)}{" "}
                <b style={{ color: C.grid }}>Grid power is the third option, and usually the weakest.</b> A new large load faces a
                multi-year interconnection queue ({dynamic ? fmt(a.gridLagMo.v) + " months to first hash here" : "modeled as instant in static mode"})
                and an all-in delivered cost near {fmt(m.sGrid.powerCost, 1)}¢/kWh once demand and capacity charges layer on top
                of the ${a.gridRate.v.toFixed(2)}/kWh headline rate. Where genuinely cheap, available grid power exists, that math
                flips: lower the grid rate and the model will show it.
              </div>
              <div style={{ fontSize: 11, color: C.muted, marginTop: 12, lineHeight: 1.6, fontFamily: mono }}>
                Verified Jul 2026: BTC ≈ $62–64k · network ≈ 940 EH/s (peaked &gt;1,000 EH/s early 2026) · hashprice ≈ $29/PH/day ·
                {"current-gen " + (activeCooling(a) ? COOLING[activeCooling(a)].name + " " : "") + "ASIC " + fmt(a.hashTH.v) + " TH/s @ " + a.drawKW.v + " kW (" + (a.drawKW.v * 1000 / a.hashTH.v).toFixed(1) + " J/TH, ≈$" + (a.asicPrice.v / a.hashTH.v).toFixed(0) + "/TH)"} · MW-class NG genset factory deliveries quoting into late 2027 ·
                professional wellhead-power operators guarantee ≈90% uptime. Adjustable assumptions: hashrate growth, BTC price path,
                genset residual value, routine O&M and periodic top-end rebuilds (modeled as lump costs at each engine-hour threshold; levelized in the steady-state table).
                {" "}Simplification, disclosed: all paths buy today's ASICs at today's price even when they deploy years out (owned/grid would really buy cheaper, more-efficient rigs later — this is slightly conservative *toward* 2G).
                {" "}All figures budgetary and illustrative — actual results depend on miner efficiency, network conditions, pool fees, and gas contract terms.
              </div>
            </div>

            {/* print-only assumptions block — the on-screen input rail is hidden in print, so a
                sophisticated (O&G finance) reader can still see "at what assumptions" on the one-pager */}
            <div className="print-only print-card" style={{ border: `1px solid ${C.line}`, borderRadius: 6, padding: "12px 16px", marginBottom: 14 }}>
              <div style={{ fontWeight: 700, color: C.green, marginBottom: 8, fontSize: 13 }}>
                Assumptions — {preset ? PRESETS[preset].label : "Custom"} · {dynamic ? "Dynamic" : "Static"} market · {yrs}-yr horizon
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "3px 18px", fontSize: 11 }}>
                {[
                  ["Site size", fmt(a.siteKW.v) + " kW"],
                  ["Stranded gas", "$" + a.gasPrice.v.toFixed(2) + "/MCF"],
                  ["BTC price", money(a.btcPrice.v)],
                  ["Network hashrate", fmt(a.netHashEH.v) + " EH/s"],
                  ["Hashrate growth", fmt(a.hashGrowth.v) + "%/yr"],
                  ["Months to halving", fmt(a.halvingMo.v)],
                  ["ASIC", fmt(a.hashTH.v) + " TH @ " + a.drawKW.v + " kW"],
                  ["ASIC price", money(a.asicPrice.v)],
                  ["Owned genset", money(a.msrpPerKW.v) + "/kW · " + fmt(a.ownedLagMo.v) + "-mo lead"],
                  ["Owned uptime", fmt(a.ownUptime.v) + "%"],
                  ["2G rate", money(a.rentalRate.v) + "/kW/mo"],
                  ["2G uptime", fmt(a.rentUptime.v) + "%"],
                  ["Grid power", "$" + a.gridRate.v.toFixed(2) + "/kWh ×" + a.gridUplift.v + " · " + fmt(a.gridLagMo.v) + "-mo wait"],
                  ["Discount rate", a.discRate.v > 0 ? fmt(a.discRate.v) + "%/yr" : "off (nominal)"],
                ].map(([l, v]) => (
                  <div key={l} style={{ display: "flex", justifyContent: "space-between", gap: 8, borderBottom: `1px solid ${C.line}`, padding: "2px 0" }}>
                    <span style={{ color: C.muted }}>{l}</span><span style={{ fontWeight: 600 }}>{v}</span>
                  </div>
                ))}
              </div>
              <div style={{ fontSize: 9.5, color: C.muted, marginTop: 8 }}>Budgetary — not a quote. Assumptions are adjustable; verify market data before use.</div>
            </div>

          </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
</body>
</html>
